    <style>
        /* ========================================
           CSS Custom Properties (Design Tokens)
           Palette from kleurenpalet.jpeg:
             Lavender #9E90AB | Marigold #E5983A
             Cream #E0D9C6   | Olive #8FA34E
             Forest #4D5B38
           ======================================== */
        :root {
            /* Wildflower color palette */
            --color-bg-primary: #FBF8F0;
            --color-bg-secondary: #F6F2E8;
            --color-accent: #8FA34E;
            --color-accent-hover: #4D5B38;
            --color-text-primary: #3A3A2E;
            --color-text-muted: #7B7562;
            --color-surface: #FFFDF8;
            --color-cream: #E0D9C6;

            /* Wildflower accent colors */
            --color-wildflower-lavender: #9E90AB;
            --color-wildflower-orange: #E5983A;
            --color-wildflower-cream: #E0D9C6;
            --color-wildflower-olive: #8FA34E;
            --color-wildflower-forest: #4D5B38;

            /* Shadows and borders */
            --shadow-sm: 0 2px 8px rgba(77, 91, 56, 0.07);
            --shadow-md: 0 10px 30px rgba(77, 91, 56, 0.09);
            --shadow-lg: 0 18px 40px rgba(77, 91, 56, 0.13);
            --shadow-inset: inset 0 -6px 8px rgba(0, 0, 0, 0.06);
            --border-subtle: rgba(143, 163, 78, 0.15);
            --border-card: rgba(158, 144, 171, 0.12);

            /* Spacing and sizing */
            --max-width: 720px;
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --gap-sm: 14px;
            --gap-md: 20px;
            --gap-lg: 28px;

            /* Typography */
            --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-sans: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-weight-normal: 400;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
        }

        /* ========================================
           Base Styles & Reset
           ======================================== */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            min-height: 100%;
            margin: 0;
            padding: 40px 20px;
            font-family: var(--font-sans);
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-text-primary);
            background-color: var(--color-bg-primary);
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(158, 144, 171, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 20%, rgba(229, 152, 58, 0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 90%, rgba(143, 163, 78, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 80%, rgba(229, 152, 58, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 70%, rgba(158, 144, 171, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========================================
           Card Container
           ======================================== */
        .card {
            width: 100%;
            max-width: var(--max-width);
            background: rgba(255, 253, 248, 0.88);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-card);
            overflow: hidden;
            position: relative;
        }

        /* ========================================
           Wildflower Meadow Decoration (Bottom)
           ======================================== */
        .meadow-bottom {
            width: 100%;
            height: 140px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg,
                transparent 0%,
                rgba(224, 217, 198, 0.10) 40%,
                rgba(143, 163, 78, 0.08) 100%);
        }

        .meadow-bottom svg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ========================================
           Language Switcher
           ======================================== */
        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 14px var(--gap-md) 0;
        }

        .lang-btn {
            background: none;
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 4px 10px;
            font-family: var(--font-sans);
            font-size: 12px;
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-muted);
            cursor: pointer;
            transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
        }

        .lang-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .lang-btn.active {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: #fff;
        }

        /* ========================================
           Hero Section
           ======================================== */
        .hero {
            padding: 40px var(--gap-lg) 24px;
            text-align: center;
            position: relative;
        }

        .ampersand {
            display: inline-block;
            color: var(--color-wildflower-orange);
            font-style: italic;
            padding: 0 4px;
        }

        h1 {
            margin: 8px 0 8px;
            font-family: var(--font-serif);
            font-weight: var(--font-weight-bold);
            font-size: clamp(26px, 5.5vw, 36px);
            letter-spacing: 0.5px;
            color: var(--color-wildflower-forest);
            line-height: 1.2;
        }

        .date {
            display: inline-block;
            font-size: 15px;
            font-weight: var(--font-weight-semibold);
            color: var(--color-wildflower-olive);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--color-text-muted);
            margin: 6px 0 0;
            line-height: 1.4;
        }

        /* Decorative wildflower sprig below subtitle */
        .sprig {
            display: block;
            margin: 14px auto 0;
            width: 80px;
            height: 24px;
        }

        /* ========================================
           Links Section
           ======================================== */
        .links {
            padding: var(--gap-md) var(--gap-md) 36px;
            display: flex;
            flex-direction: column;
            gap: var(--gap-sm);
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: var(--gap-sm);
            padding: 14px 16px;
            background: var(--color-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: var(--color-text-primary);
            transition: transform 180ms cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 180ms cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 180ms ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn:hover,
        .link-btn:focus-visible {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--color-accent);
        }

        .link-btn:focus-visible {
            outline: 3px solid var(--color-accent);
            outline-offset: 2px;
        }

        .link-btn:active {
            transform: translateY(-2px);
        }

        .link-content {
            flex: 1;
            min-width: 0;
        }

        /* Each icon gets a unique wildflower color combination */
        .flower-ico {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            display: grid;
            place-items: center;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-inset);
        }

        .flower-ico--rsvp {
            background: linear-gradient(135deg, var(--color-wildflower-olive), var(--color-wildflower-forest));
            color: #fff;
        }

        .link-label {
            font-weight: var(--font-weight-semibold);
            font-size: 16px;
            margin-bottom: 2px;
            color: var(--color-text-primary);
        }

        .link-desc {
            font-size: 13px;
            color: var(--color-text-muted);
            line-height: 1.3;
        }

        /* ========================================
           Coming Soon Notice
           ======================================== */
        .coming-soon {
            text-align: center;
            padding: 0 var(--gap-md) 8px;
            color: var(--color-text-muted);
            font-size: 14px;
            font-style: italic;
        }

        /* ========================================
           Footer
           ======================================== */
        .footer {
            font-size: 12px;
            color: var(--color-text-muted);
            text-align: center;
            padding: 18px var(--gap-md);
            position: relative;
        }

        /* ========================================
           Responsive Design
           ======================================== */
        @media (max-width: 520px) {
            body {
                padding: 20px 16px;
            }

            .meadow-bottom {
                height: 110px;
            }

            .hero {
                padding: 28px 18px 20px;
            }

            .links {
                padding: var(--gap-md) 16px 28px;
            }

            .link-btn {
                padding: 12px 14px;
            }

            .flower-ico {
                width: 40px;
                height: 40px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            html {
                scroll-behavior: auto;
            }
        }

        /* ========================================
           Print Styles
           ======================================== */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .card {
                box-shadow: none;
                border: 1px solid #ccc;
            }

            .meadow-bottom {
                display: none;
            }

            .lang-switcher {
                display: none;
            }

            .link-btn {
                page-break-inside: avoid;
            }

            .link-btn::after {
                content: " (" attr(href) ")";
                font-size: 10px;
                color: #666;
            }
        }
    </style>
</head>

    <script>
        (function () {
            var translations = {
                en: {
                    date: 'August 1, 2026',
                    subtitle: 'Join us in celebrating our special day',
                    rsvp_label: 'RSVP',
                    rsvp_desc: 'Let us know if you can join us',
                    coming_soon: 'More info coming soon',
                    footer: 'Made with love'
                },
                nl: {
                    date: '1 augustus 2026',
                    subtitle: 'Vier met ons onze bijzondere dag',
                    rsvp_label: 'RSVP',
                    rsvp_desc: 'Laat ons weten of je erbij kunt zijn',
                    coming_soon: 'Meer informatie volgt binnenkort',
                    footer: 'Gemaakt met liefde'
                },
                ru: {
                    date: '1 августа 2026',
                    subtitle: 'Приглашаем вас разделить с нами этот особенный день',
                    rsvp_label: 'Подтвердить участие',
                    rsvp_desc: 'Сообщите нам, сможете ли вы присоединиться',
                    coming_soon: 'Скоро будет больше информации',
                    footer: 'Сделано с любовью'
                }
            };

            function setLang(lang) {
                if (!translations[lang]) return;
                var items = document.querySelectorAll('[data-i18n]');
                for (var i = 0; i < items.length; i++) {
                    var key = items[i].getAttribute('data-i18n');
                    if (translations[lang][key]) {
                        items[i].textContent = translations[lang][key];
                    }
                }
                document.documentElement.lang = lang;
                var buttons = document.querySelectorAll('.lang-btn');
                for (var j = 0; j < buttons.length; j++) {
                    buttons[j].classList.toggle('active', buttons[j].getAttribute('data-lang') === lang);
                }
                try { localStorage.setItem('lang', lang); } catch (e) {}
            }

            var buttons = document.querySelectorAll('.lang-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].addEventListener('click', function () {
                    setLang(this.getAttribute('data-lang'));
                });
            }

            var saved = null;
            try { saved = localStorage.getItem('lang'); } catch (e) {}
            if (saved && translations[saved]) {
                setLang(saved);
            }
        })();
    </script>
