<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="Wedding celebration — Yuliya & Michael. More info coming soon.">
    <meta name="theme-color" content="#8FA34E">
    <meta property="og:title" content="Yuliya & Michael — Wedding Celebration">
    <meta property="og:description" content="The website will be online soon!">
    <meta property="og:type" content="website">
    <title>Yuliya &amp; Michael — Wedding Celebration</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"></noscript>

    <style>
        :root {
            --color-bg-primary: #FBF8F0;
            --color-accent: #8FA34E;
            --color-text-primary: #3A3A2E;
            --color-text-muted: #7B7562;
            --color-surface: #FFFDF8;
            --border-card: rgba(158, 144, 171, 0.12);
            --shadow-md: 0 10px 30px rgba(77, 91, 56, 0.09);
            --radius-lg: 20px;
            --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-sans: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            min-height: 100%;
            margin: 0;
            padding: 40px 20px;
            font-family: var(--font-sans);
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-text-primary);
            background-color: var(--color-bg-primary);
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(158, 144, 171, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 20%, rgba(229, 152, 58, 0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 90%, rgba(143, 163, 78, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 80%, rgba(229, 152, 58, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 70%, rgba(158, 144, 171, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 253, 248, 0.88);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-card);
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 700;
            color: var(--color-text-primary);
            margin: 0 0 12px;
            letter-spacing: 0.02em;
        }

        .card-content {
            padding: 60px 40px 32px;
        }

        .meadow-bottom {
            width: 100%;
            overflow: hidden;
            line-height: 0;
            text-align: center;
        }

        .meadow-bottom img {
            max-width: 100%;
            height: auto;
            display: inline-block;
        }

        .coming-soon {
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            color: var(--color-text-muted);
            margin: 0 0 6px;
            font-weight: 600;
        }

        .coming-soon-ru {
            font-size: clamp(0.9rem, 2vw, 1rem);
            color: var(--color-text-muted);
            margin: 0;
            font-weight: 400;
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="card-content">
            <h1>Yuliya &amp; Michael</h1>
            <p class="coming-soon">The website will be online soon!</p>
            <p class="coming-soon-ru">Сайт скоро откроется!</p>
        </div>

        <div class="meadow-bottom" aria-hidden="true">
            <img src="banner-footer.png" alt="" loading="lazy">
        </div>
    </main>
</body>
</html>
